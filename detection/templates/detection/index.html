<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeMotion | AI Driver Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --danger: #ff4d4d;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            /* Fill the screen */
            overflow: hidden;
            /* Prevent scrolling */
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        header {
            padding: 1rem 0;
            /* Reduced padding */
            text-align: center;
            width: 100%;
        }

        h1 {
            font-size: 1.8rem;
            /* Smaller font */
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #007bff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            width: 95%;
            max-width: 1200px;
            display: flex;
            flex-direction: row;
            /* Horizontal layout to save vertical space */
            gap: 1.5rem;
            flex: 1;
            align-items: center;
            padding-bottom: 2rem;
            max-height: calc(100vh - 100px);
        }

        .video-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100%;
            justify-content: center;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #1e293b;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #64748b;
        }

        .side-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100%;
            justify-content: center;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-start {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 123, 255, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-stop {
            background-color: #334155;
            color: #94a3b8;
        }

        .btn-stop:hover {
            background-color: var(--danger);
            color: white;
            transform: translateY(-2px);
        }

        .info-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 1.25rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
        }

        h2 {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: #60a5fa;
        }

        ul {
            color: #94a3b8;
            line-height: 1.4;
            padding-left: 1.2rem;
            margin: 0;
        }

        .alert-status {
            padding: 1rem;
            border-radius: 0.75rem;
            text-align: center;
            font-weight: 700;
            transition: all 0.3s;
            background: #1e293b;
            color: #64748b;
        }

        .alert-active {
            background: var(--danger);
            color: white;
            animation: pulse 1.0s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>SafeMotion</h1>
    </header>

    <div class="main-container">
        <div class="video-section">
            <div class="video-wrapper">
                <div id="placeholder" class="video-placeholder">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" concentrate="13" r="4" />
                    </svg>
                    <p>Monitoring Standby</p>
                </div>
                <img id="video-feed" src="" alt="Video Feed">
            </div>
            <div id="alert-display" class="alert-status">SYSTEM IDLE</div>
        </div>

        <div class="side-panel">
            <div class="controls">
                <button class="btn-start" onclick="startWebcam()">Start Monitoring</button>
                <button class="btn-stop" onclick="stopWebcam()">Stop Monitoring</button>
            </div>

            <div class="info-panel">
                <h2>Safety Tracks</h2>
                <ul>
                    <li><strong>Eyes:</strong> Fatigue detection</li>
                    <li><strong>Phone:</strong> Attention check</li>
                    <li><strong>Smoking:</strong> Compliance check</li>
                    <li><strong>Threshold:</strong> 1.5s continuous</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Alarm sound -->
    <audio id="alert-audio" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        let pollingInterval = null;
        const audio = document.getElementById('alert-audio');
        const alertDisplay = document.getElementById('alert-display');

        function startWebcam() {
            const feed = document.getElementById('video-feed');
            const placeholder = document.getElementById('placeholder');
            feed.src = "{% url 'video_feed' %}";
            feed.style.display = 'block';
            placeholder.style.display = 'none';
            alertDisplay.innerText = "MONITORING ACTIVE";

            // Start polling for alerts
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(updateAlertStatus, 500);
        }

        function stopWebcam() {
            const feed = document.getElementById('video-feed');
            const placeholder = document.getElementById('placeholder');
            feed.src = "";
            feed.style.display = 'none';
            placeholder.style.display = 'flex';
            alertDisplay.innerText = "SYSTEM IDLE";
            alertDisplay.classList.remove('alert-active');

            if (pollingInterval) clearInterval(pollingInterval);
            audio.pause();
            audio.currentTime = 0;
        }

        async function updateAlertStatus() {
            try {
                const response = await fetch("{% url 'check_alert' %}");
                const data = await response.json();

                if (data.alerting) {
                    alertDisplay.innerText = "⚠️ DISTRACTION ALERT!";
                    alertDisplay.classList.add('alert-active');
                    if (audio.paused) {
                        const playPromise = audio.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(error => {
                                console.log("Autoplay prevented or audio blocked.");
                            });
                        }
                    }
                } else {
                    alertDisplay.innerText = "MONITORING ACTIVE";
                    alertDisplay.classList.remove('alert-active');
                    audio.pause();
                    audio.currentTime = 0;
                }
            } catch (err) {
                console.error("Polling error:", err);
            }
        }
    </script>
</body>

</html>
